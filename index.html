<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cookie browser</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:system-ui,sans-serif;
}

body{
    background:#111;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.toolbar{
    background:#1b1b1b;
    padding:10px;
    display:flex;
    gap:8px;
}

#url{
    flex:1;
    background:#222;
    border:none;
    color:white;
    padding:10px;
    border-radius:8px;
}

button{
    background:#333;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
}

.tabs{
    display:flex;
    overflow-x:auto;
    background:#181818;
}

.tab{
    padding:10px 14px;
    background:#222;
    border-right:1px solid #333;
    cursor:pointer;
    white-space:nowrap;
}

.tab.active{
    background:#444;
}

.viewer{
    flex:1;
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}

.message{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    color:#bbb;
}
</style>
</head>
<body>

<div class="toolbar">
    <input id="url" placeholder="enter a website url">
    <button onclick="go()">go</button>
    <button onclick="newTab()">+</button>
</div>

<div class="tabs" id="tabs"></div>

<div class="viewer">
    <iframe id="frame"></iframe>
    <div class="message" id="message">
        this site may not allow embedding in iframes.
    </div>
</div>

<script>
let tabs = [
    {
        title:"new tab",
        url:"https://example.org"
    }
];

let activeTab = 0;

function renderTabs(){
    const el = document.getElementById("tabs");

    el.innerHTML = tabs.map((tab,index)=>`
        <div
            class="tab ${index===activeTab?'active':''}"
            onclick="switchTab(${index})">
            ${tab.title}
        </div>
    `).join("");
}

function switchTab(index){
    activeTab = index;
    loadTab();
}

function newTab(){
    tabs.push({
        title:"new tab",
        url:"https://example.org"
    });

    activeTab = tabs.length - 1;
    loadTab();
}

function normalizeUrl(url){
    if(!/^https?:\/\//i.test(url)){
        return "https://" + url;
    }
    return url;
}

function go(){
    const input = document.getElementById("url");

    tabs[activeTab].url = normalizeUrl(input.value);
    tabs[activeTab].title = input.value;

    loadTab();
}

function loadTab(){
    renderTabs();

    const tab = tabs[activeTab];

    document.getElementById("url").value = tab.url;

    const frame = document.getElementById("frame");
    const msg = document.getElementById("message");

    msg.style.display = "none";

    frame.src = tab.url;

    setTimeout(()=>{
        msg.style.display = "flex";
    },4000);
}

loadTab();
</script>

</body>
</html>
